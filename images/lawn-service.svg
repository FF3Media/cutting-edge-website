<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lawnServiceSkyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="lawnServiceLawnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>

    <filter id="mowerShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>

    <radialGradient id="sunGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="400" fill="url(#lawnServiceSkyGradient)"/>

  <!-- Sun rays -->
  <circle cx="520" cy="60" r="50" fill="url(#sunGradient)"/>
  <circle cx="520" cy="60" r="20" fill="#FFD700" opacity="0.8"/>

  <!-- Light rays effect -->
  <line x1="520" y1="10" x2="520" y2="50" stroke="#FFD700" stroke-width="2" opacity="0.2"/>
  <line x1="520" y1="70" x2="520" y2="110" stroke="#FFD700" stroke-width="2" opacity="0.2"/>
  <line x1="470" y1="60" x2="510" y2="60" stroke="#FFD700" stroke-width="2" opacity="0.2"/>
  <line x1="530" y1="60" x2="570" y2="60" stroke="#FFD700" stroke-width="2" opacity="0.2"/>

  <!-- Lawn (2/3 of the canvas) -->
  <rect x="0" y="200" width="600" height="200" fill="url(#lawnServiceLawnGradient)"/>

  <!-- Striped mowing pattern -->
  <line x1="0" y1="215" x2="600" y2="215" stroke="#1a5f2d" stroke-width="12" opacity="0.5"/>
  <line x1="0" y1="235" x2="600" y2="235" stroke="#22c55e" stroke-width="12" opacity="0.4"/>
  <line x1="0" y1="255" x2="600" y2="255" stroke="#1a5f2d" stroke-width="12" opacity="0.5"/>
  <line x1="0" y1="275" x2="600" y2="275" stroke="#22c55e" stroke-width="12" opacity="0.4"/>
  <line x1="0" y1="295" x2="600" y2="295" stroke="#1a5f2d" stroke-width="12" opacity="0.5"/>
  <line x1="0" y1="315" x2="600" y2="315" stroke="#22c55e" stroke-width="12" opacity="0.4"/>
  <line x1="0" y1="335" x2="600" y2="335" stroke="#1a5f2d" stroke-width="12" opacity="0.5"/>
  <line x1="0" y1="355" x2="600" y2="355" stroke="#22c55e" stroke-width="12" opacity="0.4"/>

  <!-- Edging detail on left -->
  <rect x="0" y="200" width="180" height="8" fill="#15803d" opacity="0.9"/>
  <line x1="0" y1="208" x2="180" y2="208" stroke="#0d3b1f" stroke-width="1" opacity="0.5"/>

  <!-- Landscape garden bed -->
  <ellipse cx="100" cy="220" rx="60" ry="35" fill="#86efac" opacity="0.8"/>
  <ellipse cx="100" cy="215" rx="55" ry="30" fill="#7ee28d"/>

  <!-- Flowers/plants in garden bed -->
  <circle cx="70" cy="210" r="6" fill="#DC143C" opacity="0.7"/>
  <circle cx="90" cy="205" r="6" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="110" cy="208" r="6" fill="#DC143C" opacity="0.7"/>
  <circle cx="130" cy="212" r="6" fill="#FFB6C1" opacity="0.7"/>

  <!-- Lawn mower body -->
  <g filter="url(#mowerShadow)">
    <!-- Main deck/platform -->
    <rect x="200" y="260" width="180" height="90" rx="10" fill="#C41E3A" opacity="0.9"/>
    <rect x="205" y="265" width="170" height="80" rx="8" fill="#DC143C"/>

    <!-- Handle bars -->
    <line x1="240" y1="265" x2="240" y2="180" stroke="#333" stroke-width="5"/>
    <line x1="340" y1="265" x2="340" y2="180" stroke="#333" stroke-width="5"/>

    <!-- Handle grip -->
    <rect x="220" y="170" width="120" height="18" rx="8" fill="#333"/>
    <rect x="225" y="173" width="110" height="12" fill="#444"/>

    <!-- Wheels -->
    <!-- Back left wheel -->
    <circle cx="220" cy="350" r="22" fill="#1a1a1a"/>
    <circle cx="220" cy="350" r="18" fill="#333"/>
    <circle cx="220" cy="350" r="3" fill="#666"/>

    <!-- Back right wheel -->
    <circle cx="360" cy="350" r="22" fill="#1a1a1a"/>
    <circle cx="360" cy="350" r="18" fill="#333"/>
    <circle cx="360" cy="350" r="3" fill="#666"/>

    <!-- Front left wheel -->
    <circle cx="240" cy="355" r="16" fill="#1a1a1a"/>
    <circle cx="240" cy="355" r="13" fill="#333"/>
    <circle cx="240" cy="355" r="2" fill="#666"/>

    <!-- Front right wheel -->
    <circle cx="340" cy="355" r="16" fill="#1a1a1a"/>
    <circle cx="340" cy="355" r="13" fill="#333"/>
    <circle cx="340" cy="355" r="2" fill="#666"/>

    <!-- Cutting blade area (bottom of mower) -->
    <rect x="205" y="335" width="170" height="8" fill="#888" opacity="0.6"/>

    <!-- Engine detail -->
    <rect x="270" y="275" width="60" height="35" fill="#555"/>
    <circle cx="290" cy="285" r="4" fill="#333"/>
    <circle cx="310" cy="285" r="4" fill="#333"/>
  </g>

  <!-- Grass clippings effect -->
  <ellipse cx="380" cy="340" rx="40" ry="20" fill="#22c55e" opacity="0.4"/>
  <path d="M 370 330 Q 375 320 385 325 Q 395 315 405 320" stroke="#1a5f2d" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Decorative clouds -->
  <ellipse cx="80" cy="80" rx="50" ry="25" fill="white" opacity="0.6"/>
  <ellipse cx="120" cy="95" rx="45" ry="22" fill="white" opacity="0.5"/>

  <!-- Text/Badge area (simple line suggesting text) -->
  <rect x="150" y="20" width="300" height="60" rx="10" fill="none" stroke="#15803d" stroke-width="2" opacity="0.3"/>
</svg>