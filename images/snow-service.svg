<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="earlyMorningSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a69bd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4a460;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="snowServiceSnowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>

    <filter id="snowPlowShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>

    <filter id="houseLightGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>

    <!-- Snowflake -->
    <g id="snowflake2">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="0.8"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="0.8"/>
      <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5" stroke="white" stroke-width="0.8"/>
      <line x1="-5.5" y1="5.5" x2="5.5" y2="-5.5" stroke="white" stroke-width="0.8"/>
    </g>
  </defs>

  <!-- Dawn sky gradient -->
  <rect width="600" height="400" fill="url(#earlyMorningSky)"/>

  <!-- Falling snowflakes -->
  <use href="#snowflake2" x="80" y="60" opacity="0.5"/>
  <use href="#snowflake2" x="180" y="40" opacity="0.45"/>
  <use href="#snowflake2" x="350" y="80" opacity="0.5"/>
  <use href="#snowflake2" x="480" y="50" opacity="0.45"/>
  <use href="#snowflake2" x="120" y="150" opacity="0.6"/>
  <use href="#snowflake2" x="420" y="180" opacity="0.55"/>
  <use href="#snowflake2" x="300" y="200" opacity="0.5"/>
  <use href="#snowflake2" x="520" y="220" opacity="0.55"/>

  <!-- Snow ground -->
  <rect x="0" y="240" width="600" height="160" fill="url(#snowServiceSnowGradient)"/>

  <!-- Snow banks/drifts -->
  <ellipse cx="150" cy="270" rx="120" ry="45" fill="#D0D0D0" opacity="0.6"/>
  <ellipse cx="450" cy="290" rx="140" ry="50" fill="#D0D0D0" opacity="0.5"/>

  <!-- Cleared driveway path -->
  <polygon points="150,240 100,280 200,280 250,240" fill="#7A7A7A" filter="url(#snowPlowShadow)"/>
  <polygon points="150,260 100,290 200,290 250,260" fill="#8B8B8B"/>

  <!-- Snow plow path/trail showing cleared area -->
  <path d="M 80 300 Q 200 320 350 350" stroke="#A0A0A0" stroke-width="40" fill="none" opacity="0.4"/>

  <!-- Pine trees with snow -->
  <!-- Left tree -->
  <polygon points="80,240 60,290 100,290" fill="#1a4d2e"/>
  <polygon points="80,220 50,280 110,280" fill="#2d6a4f"/>
  <polygon points="80,200 45,270 115,270" fill="#1a4d2e"/>
  <!-- Snow on tree -->
  <polygon points="80,225 65,275 95,275" fill="white" opacity="0.4"/>

  <!-- Right tree -->
  <polygon points="520,250 500,300 540,300" fill="#1a4d2e"/>
  <polygon points="520,230 490,290 550,290" fill="#2d6a4f"/>
  <polygon points="520,210 485,280 555,280" fill="#1a4d2e"/>
  <!-- Snow on tree -->
  <polygon points="520,235 505,285 535,285" fill="white" opacity="0.4"/>

  <!-- House structure -->
  <g filter="url(#snowPlowShadow)">
    <!-- Main walls -->
    <rect x="320" y="100" width="200" height="160" fill="#E8D4B8"/>

    <!-- Roof -->
    <polygon points="320,100 420,40 520,100" fill="#2D2D2D"/>
    <!-- Snow on roof -->
    <polygon points="340,100 420,60 500,100" fill="white" opacity="0.6"/>

    <!-- Door -->
    <rect x="435" y="210" width="30" height="70" fill="#654321"/>
    <circle cx="460" cy="245" r="2" fill="#FFD700"/>

    <!-- Left window with warm amber light -->
    <rect x="345" y="120" width="35" height="35" fill="#FFA500" filter="url(#houseLightGlow)"/>
    <line x1="362.5" y1="120" x2="362.5" y2="155" stroke="#333" stroke-width="0.5" opacity="0.3"/>
    <line x1="345" y1="137.5" x2="380" y2="137.5" stroke="#333" stroke-width="0.5" opacity="0.3"/>

    <!-- Right window with warm amber light -->
    <rect x="475" y="120" width="35" height="35" fill="#FFA500" filter="url(#houseLightGlow)"/>
    <line x1="492.5" y1="120" x2="492.5" y2="155" stroke="#333" stroke-width="0.5" opacity="0.3"/>
    <line x1="475" y1="137.5" x2="510" y2="137.5" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Warm light glow effect -->
  <circle cx="362.5" cy="137.5" r="20" fill="#FFA500" opacity="0.08"/>
  <circle cx="492.5" cy="137.5" r="20" fill="#FFA500" opacity="0.08"/>

  <!-- Chimney with smoke -->
  <rect x="435" y="40" width="15" height="60" fill="#8B4513"/>
  <!-- Smoke -->
  <circle cx="442.5" cy="35" r="6" fill="white" opacity="0.3"/>
  <circle cx="445" cy="20" r="5" fill="white" opacity="0.25"/>

  <!-- Snow plow/truck outline -->
  <g filter="url(#snowPlowShadow)">
    <!-- Truck cab -->
    <rect x="30" y="290" width="70" height="60" fill="#DC143C"/>
    <rect x="35" y="295" width="60" height="50" fill="#E63946"/>

    <!-- Truck bed/plow area -->
    <rect x="100" y="310" width="120" height="40" fill="#FFD700" opacity="0.8"/>
    <polygon points="100,310 85,300 220,300 220,310" fill="#FFA500"/>

    <!-- Plow blade detail -->
    <polygon points="100,350 220,350 210,365 110,365" fill="#666"/>
    <polygon points="105,352 215,352 210,363 110,363" fill="#888"/>

    <!-- Wheels -->
    <circle cx="60" cy="350" r="15" fill="#1a1a1a"/>
    <circle cx="60" cy="350" r="12" fill="#333"/>

    <circle cx="150" cy="350" r="15" fill="#1a1a1a"/>
    <circle cx="150" cy="350" r="12" fill="#333"/>

    <circle cx="200" cy="350" r="15" fill="#1a1a1a"/>
    <circle cx="200" cy="350" r="12" fill="#333"/>

    <!-- Windows on cab -->
    <rect x="40" y="310" width="20" height="18" fill="#87CEEB" opacity="0.6"/>
    <rect x="70" y="310" width="20" height="18" fill="#87CEEB" opacity="0.6"/>

    <!-- Headlights -->
    <circle cx="38" cy="350" r="4" fill="#FFD700" opacity="0.7"/>
    <circle cx="52" cy="350" r="4" fill="#FFD700" opacity="0.7"/>
  </g>

  <!-- Snow spray effect from plow -->
  <ellipse cx="200" cy="330" rx="60" ry="25" fill="white" opacity="0.3"/>
  <path d="M 220 320 Q 240 300 260 310" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
</svg>