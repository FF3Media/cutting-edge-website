<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mapBackgroundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0E8F0;stop-opacity:1" />
    </linearGradient>

    <filter id="mapShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>

    <radialGradient id="kanataHighlight" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:0.1" />
    </radialGradient>
  </defs>

  <!-- Map background -->
  <rect width="600" height="400" fill="url(#mapBackgroundGradient)"/>

  <!-- Ottawa River (top) -->
  <path d="M 0 40 Q 150 35 300 50 Q 450 35 600 45" stroke="#2563eb" stroke-width="20" fill="none" opacity="0.6"/>
  <path d="M 0 40 Q 150 35 300 50 Q 450 35 600 45" stroke="#60a5fa" stroke-width="12" fill="none" opacity="0.5"/>

  <!-- Water texture -->
  <circle cx="100" cy="40" r="8" fill="#60a5fa" opacity="0.3"/>
  <circle cx="250" cy="55" r="6" fill="#60a5fa" opacity="0.25"/>
  <circle cx="450" cy="45" r="7" fill="#60a5fa" opacity="0.3"/>

  <!-- Major streets grid (subtle) -->
  <line x1="150" y1="80" x2="150" y2="350" stroke="#999" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="300" y1="80" x2="300" y2="350" stroke="#999" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="450" y1="80" x2="450" y2="350" stroke="#999" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>

  <line x1="50" y1="150" x2="550" y2="150" stroke="#999" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="50" y1="250" x2="550" y2="250" stroke="#999" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>

  <!-- Kanata area (center-right, highlighted in brand green) -->
  <circle cx="400" cy="220" r="70" fill="url(#kanataHighlight)" filter="url(#mapShadow)"/>
  <circle cx="400" cy="220" r="65" fill="#15803d" opacity="0.15" stroke="#15803d" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Kanata label -->
  <text x="400" y="225" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#15803d" text-anchor="middle" filter="url(#mapShadow)">KANATA</text>
  <circle cx="400" cy="220" r="3" fill="#15803d"/>

  <!-- Service areas with dots -->
  <!-- Stittsville (left of Kanata) -->
  <circle cx="280" cy="200" r="4" fill="#2563eb" filter="url(#mapShadow)"/>
  <circle cx="280" cy="200" r="8" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <text x="280" y="240" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Stittsville</text>

  <!-- Barrhaven (south-southwest) -->
  <circle cx="320" cy="320" r="4" fill="#2563eb" filter="url(#mapShadow)"/>
  <circle cx="320" cy="320" r="8" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <text x="320" y="360" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Barrhaven</text>

  <!-- Nepean (south) -->
  <circle cx="420" cy="320" r="4" fill="#2563eb" filter="url(#mapShadow)"/>
  <circle cx="420" cy="320" r="8" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <text x="420" y="360" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Nepean</text>

  <!-- Orleans (east) -->
  <circle cx="520" cy="240" r="4" fill="#2563eb" filter="url(#mapShadow)"/>
  <circle cx="520" cy="240" r="8" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <text x="520" y="280" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Orleans</text>

  <!-- Connection lines from Kanata to service areas (subtle) -->
  <line x1="400" y1="220" x2="280" y2="200" stroke="#15803d" stroke-width="1" opacity="0.2" stroke-dasharray="3,2"/>
  <line x1="400" y1="220" x2="320" y2="320" stroke="#15803d" stroke-width="1" opacity="0.2" stroke-dasharray="3,2"/>
  <line x1="400" y1="220" x2="420" y2="320" stroke="#15803d" stroke-width="1" opacity="0.2" stroke-dasharray="3,2"/>
  <line x1="400" y1="220" x2="520" y2="240" stroke="#15803d" stroke-width="1" opacity="0.2" stroke-dasharray="3,2"/>

  <!-- Central location marker for Kanata -->
  <g filter="url(#mapShadow)">
    <polygon points="400,190 395,205 405,205" fill="#15803d" opacity="0.8"/>
    <circle cx="400" cy="205" r="6" fill="#22c55e" opacity="0.9"/>
    <circle cx="400" cy="205" r="4" fill="#15803d"/>
  </g>

  <!-- Compass rose (top-right) -->
  <g opacity="0.4" transform="translate(520, 80)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#15803d" stroke-width="1"/>
    <line x1="0" y1="-20" x2="0" y2="-5" stroke="#15803d" stroke-width="2"/>
    <line x1="0" y1="5" x2="0" y2="20" stroke="#999" stroke-width="1"/>
    <line x1="-20" y1="0" x2="-5" y2="0" stroke="#999" stroke-width="1"/>
    <line x1="5" y1="0" x2="20" y2="0" stroke="#999" stroke-width="1"/>
    <text x="0" y="-28" font-family="Arial" font-size="10" fill="#15803d" text-anchor="middle" font-weight="bold">N</text>
  </g>

  <!-- Scale indicator (bottom-left) -->
  <g opacity="0.5" transform="translate(50, 360)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#333" stroke-width="2"/>
    <line x1="40" y1="-4" x2="40" y2="4" stroke="#333" stroke-width="2"/>
    <text x="20" y="15" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">5 km</text>
  </g>

  <!-- Title/Label area -->
  <rect x="20" y="20" width="280" height="50" fill="white" opacity="0.9" rx="5" filter="url(#mapShadow)"/>
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#15803d">SERVICE AREA</text>
  <text x="30" y="60" font-family="Arial, sans-serif" font-size="11" fill="#666">Ottawa Region Coverage</text>
</svg>