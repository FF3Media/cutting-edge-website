<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beforeSkyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A9A9A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D3D3D3;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="beforeLawnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9ACD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808000;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="afterSkyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="afterLawnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>

    <filter id="dividerGlow">
      <feDropShadow dx="2" dy="0" stdDeviation="3" flood-opacity="0.3"/>
    </filter>

    <filter id="beforeShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- BEFORE SIDE (Left) -->
  <!-- Before sky -->
  <rect x="0" y="0" width="400" height="400" fill="url(#beforeSkyGradient)"/>

  <!-- Before - overgrown lawn -->
  <rect x="0" y="200" width="400" height="200" fill="url(#beforeLawnGradient)"/>

  <!-- Before - weeds and overgrowth -->
  <circle cx="50" cy="240" r="25" fill="#6B8E23" opacity="0.7"/>
  <circle cx="80" cy="260" r="20" fill="#556B2F" opacity="0.6"/>
  <circle cx="120" cy="250" r="30" fill="#6B8E23" opacity="0.65"/>
  <circle cx="160" cy="270" r="25" fill="#556B2F" opacity="0.7"/>
  <circle cx="200" cy="240" r="28" fill="#6B8E23" opacity="0.65"/>
  <circle cx="240" cy="260" r="22" fill="#556B2F" opacity="0.6"/>
  <circle cx="280" cy="245" r="26" fill="#6B8E23" opacity="0.7"/>
  <circle cx="330" cy="265" r="24" fill="#556B2F" opacity="0.65"/>

  <!-- Before - weeds with spiky texture -->
  <path d="M 70 280 L 65 310 L 70 305 L 75 315 L 70 300" stroke="#556B2F" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 140 290 L 135 320 L 140 315 L 145 325 L 140 310" stroke="#556B2F" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 210 300 L 205 330 L 210 325 L 215 335 L 210 320" stroke="#556B2F" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 290 295 L 285 325 L 290 320 L 295 330 L 290 315" stroke="#556B2F" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Before - neglected house -->
  <rect x="80" y="80" width="120" height="100" fill="#A39E93" opacity="0.8" filter="url(#beforeShadow)"/>
  <!-- Roof -->
  <polygon points="80,80 140,20 200,80" fill="#5D5D5D" opacity="0.7"/>
  <!-- Windows (dark, uninviting) -->
  <rect x="95" y="100" width="25" height="25" fill="#2A2A2A" opacity="0.6"/>
  <rect x="165" y="100" width="25" height="25" fill="#2A2A2A" opacity="0.6"/>
  <!-- Door (dull) -->
  <rect x="135" y="150" width="20" height="50" fill="#3D2817" opacity="0.5"/>

  <!-- Before - unkempt appearance text/visual cues -->
  <circle cx="350" cy="80" r="20" fill="#DC143C" opacity="0.3"/>
  <text x="350" y="88" font-family="Arial" font-size="28" font-weight="bold" fill="#DC143C" text-anchor="middle" opacity="0.4">!</text>

  <!-- DIVIDER (Center) -->
  <!-- Diagonal line divider -->
  <line x1="400" y1="0" x2="400" y2="400" stroke="#15803d" stroke-width="6" filter="url(#dividerGlow)"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="#22c55e" stroke-width="2" opacity="0.7"/>

  <!-- Arrow indicator pointing right -->
  <g opacity="0.7" transform="translate(400, 200)">
    <polygon points="0,-15 10,-8 10,8" fill="#15803d"/>
    <polygon points="0,15 10,8 10,-8" fill="#15803d"/>
  </g>

  <!-- AFTER SIDE (Right) -->
  <!-- After sky -->
  <rect x="400" y="0" width="400" height="400" fill="url(#afterSkyGradient)"/>

  <!-- After - pristine lawn with stripes -->
  <rect x="400" y="200" width="400" height="200" fill="url(#afterLawnGradient)"/>

  <!-- After - striped lawn pattern -->
  <line x1="400" y1="220" x2="800" y2="220" stroke="#1a5f2d" stroke-width="10" opacity="0.5"/>
  <line x1="400" y1="240" x2="800" y2="240" stroke="#22c55e" stroke-width="10" opacity="0.4"/>
  <line x1="400" y1="260" x2="800" y2="260" stroke="#1a5f2d" stroke-width="10" opacity="0.5"/>
  <line x1="400" y1="280" x2="800" y2="280" stroke="#22c55e" stroke-width="10" opacity="0.4"/>
  <line x1="400" y1="300" x2="800" y2="300" stroke="#1a5f2d" stroke-width="10" opacity="0.5"/>
  <line x1="400" y1="320" x2="800" y2="320" stroke="#22c55e" stroke-width="10" opacity="0.4"/>
  <line x1="400" y1="340" x2="800" y2="340" stroke="#1a5f2d" stroke-width="10" opacity="0.5"/>
  <line x1="400" y1="360" x2="800" y2="360" stroke="#22c55e" stroke-width="10" opacity="0.4"/>

  <!-- After - garden bed -->
  <ellipse cx="520" cy="240" rx="50" ry="35" fill="#86efac" opacity="0.8"/>
  <ellipse cx="520" cy="235" rx="45" ry="30" fill="#7ee28d"/>

  <!-- After - flowers -->
  <circle cx="490" cy="225" r="5" fill="#DC143C" opacity="0.7"/>
  <circle cx="510" cy="220" r="5" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="530" cy="225" r="5" fill="#DC143C" opacity="0.7"/>
  <circle cx="550" cy="230" r="5" fill="#FFB6C1" opacity="0.7"/>

  <!-- After - pristine house -->
  <rect x="580" y="80" width="120" height="100" fill="#D2B48C" opacity="0.95" filter="url(#beforeShadow)"/>
  <!-- Roof -->
  <polygon points="580,80 640,20 700,80" fill="#8B4513"/>
  <!-- Windows (bright and welcoming) -->
  <rect x="595" y="100" width="25" height="25" fill="#87CEEB" opacity="0.8"/>
  <rect x="665" y="100" width="25" height="25" fill="#87CEEB" opacity="0.8"/>
  <!-- Door (well-maintained) -->
  <rect x="635" y="150" width="20" height="50" fill="#654321"/>
  <circle cx="650" cy="175" r="2" fill="#FFD700"/>

  <!-- After - perfect lawn appearance indicators -->
  <circle cx="450" cy="80" r="20" fill="#22c55e" opacity="0.3"/>
  <g transform="translate(450, 88)">
    <polyline points="-5,5 0,10 8,-5" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- After - clean driveway -->
  <rect x="580" y="250" width="100" height="80" fill="#D3D3D3" opacity="0.9" filter="url(#beforeShadow)"/>
  <rect x="585" y="255" width="90" height="70" fill="#E8E8E8"/>

  <!-- Labels -->
  <!-- BEFORE label -->
  <rect x="20" y="20" width="100" height="40" fill="white" opacity="0.9" rx="5" filter="url(#beforeShadow)"/>
  <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513" text-anchor="middle">BEFORE</text>
  <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Overgrown</text>

  <!-- AFTER label -->
  <rect x="680" y="20" width="100" height="40" fill="white" opacity="0.9" rx="5" filter="url(#beforeShadow)"/>
  <text x="730" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">AFTER</text>
  <text x="730" y="50" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Professional</text>

  <!-- Clouds on both sides for continuity -->
  <ellipse cx="100" cy="60" rx="40" ry="18" fill="white" opacity="0.4"/>
  <ellipse cx="500" cy="70" rx="40" ry="18" fill="white" opacity="0.5"/>
  <ellipse cx="700" cy="65" rx="45" ry="20" fill="white" opacity="0.45"/>
</svg>