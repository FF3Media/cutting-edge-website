    <line x1="158" y1="135" x2="160" y2="55"/>
    <line x1="162" y1="138" x2="163" y2="58"/>
    <line x1="166" y1="139" x2="166" y2="50"/>
    <line x1="170" y1="140" x2="169" y2="48"/>
