  <!-- Central vein on brown leaf -->
  <path d="M205 141 C220 115, 245 85, 267 58" stroke="#6d5210" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- Text: CUTTING EDGE -->
  <text x="200" y="200" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-weight="800" font-size="52" letter-spacing="2">
    <tspan fill="#1a5c2a">CUTTING </tspan><tspan fill="#5cb839">EDGE</tspan>
  </text>

  <!-- Text: LANDSCAPING -->
  <text x="200" y="240" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-weight="600" font-size="28" letter-spacing="8" fill="#8B6914">LANDSCAPING</text>
</svg>