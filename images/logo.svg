  <!-- Grass blades sprouting from top of leaf 2 -->
  <g stroke="#5cb839" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M198 42 C196 28, 192 18, 190 8"/>
    <path d="M203 38 C202 25, 200 15, 197 4"/>
    <path d="M208 36 C208 22, 208 12, 206 2"/>
    <path d="M213 37 C214 23, 216 13, 216 3"/>
