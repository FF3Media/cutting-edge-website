    <path d="M215 38 C217 26, 220 16, 222 8"/>
    <path d="M220 42 C223 30, 228 20, 232 12"/>
  </g>

  <!-- Leaf 3 - Brown (right, largest) -->
  <path d="M195 140 C195 140, 225 80, 260 55 C267 50, 273 52, 274 58 C278 75, 265 110, 248 130 C238 140, 218 145, 205 142Z" fill="#8B6914"/>
  <!-- Texture on brown leaf -->
  <g clip-path="url(#leaf3clip)" stroke="#ffffff" stroke-width="0.6" opacity="0.25">
    <line x1="205" y1="140" x2="235" y2="60"/>
    <line x1="209" y1="141" x2="239" y2="58"/>
    <line x1="213" y1="142" x2="243" y2="57"/>
    <line x1="217" y1="142" x2="248" y2="57"/>
    <line x1="221" y1="142" x2="253" y2="58"/>
