    <line x1="229" y1="140" x2="260" y2="63"/>
    <line x1="233" y1="139" x2="263" y2="67"/>
    <line x1="237" y1="137" x2="265" y2="72"/>
    <line x1="241" y1="135" x2="268" y2="78"/>
    <line x1="245" y1="133" x2="270" y2="84"/>
