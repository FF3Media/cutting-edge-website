    </clipPath>
  </defs>

  <!-- Leaf 1 - Dark Green (left, smallest) -->
  <path d="M160 140 C160 140, 145 90, 155 50 C158 40, 165 35, 170 40 C180 50, 185 80, 185 100 C185 115, 178 130, 165 140Z" fill="#1a5c2a"/>
